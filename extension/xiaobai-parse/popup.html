<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小白素材解析工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 300px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #ffffff;
            color: #1f1f1f;
        }

        .header {
            padding: 20px 20px 16px;
            text-align: center;
            background: linear-gradient(135deg, #f8f9ff 0%, #eef0ff 100%);
            border-bottom: 1px solid #e4e6f5;
        }

        .header-icon {
            font-size: 30px;
            margin-bottom: 7px;
        }

        .header h1 {
            font-size: 17px;
            font-weight: 700;
            color: #1f1f1f;
            margin-bottom: 3px;
        }

        .header-sub {
            font-size: 12px;
            color: #8b8b8b;
        }

        .body {
            padding: 16px 16px 12px;
        }

        .steps {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .step {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            background: #fafafa;
            border: 1px solid #f0f0f0;
            border-radius: 8px;
        }

        .step-num {
            min-width: 20px;
            height: 20px;
            background: #1f1f1f;
            color: #ffffff;
            border-radius: 50%;
            font-size: 11px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .step-text {
            font-size: 13px;
            color: #3b3b3b;
            line-height: 1.4;
        }

        .step-text strong {
            color: #1f1f1f;
        }

        .github-wrap {
            text-align: center;
            margin-top: 14px;
        }

        .link-button {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 16px;
            background: #f7f7f7;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            color: #1f1f1f;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .link-button:hover {
            background: #ffffff;
            border-color: #1f1f1f;
        }

        .link-button svg {
            width: 15px;
            height: 15px;
        }

        .footer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 16px;
            border-top: 1px solid #e0e0e0;
            background: #fafafa;
        }

        .footer-text {
            font-size: 12px;
            color: #b0b0b0;
        }

        .header-version {
            font-size: 12px;
            font-weight: 400;
            color: #b0b0b0;
            vertical-align: middle;
            margin-left: 5px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-icon">📷</div>
        <h1>小白素材解析工具<span class="header-version">v0.1.0</span></h1>
        <p class="header-sub">图片 / 视频素材提取工具</p>
    </div>

    <div class="body">
        <ul class="steps">
            <li class="step">
                <span class="step-num">1</span>
                <span class="step-text">访问<strong>豆包</strong>或<strong>千问</strong>对话页面</span>
            </li>
            <li class="step">
                <span class="step-num">2</span>
                <span class="step-text">滚动到目标图片或视频附近，必要时点击分享或复制链接按钮</span>
            </li>
            <li class="step">
                <span class="step-num">3</span>
                <span class="step-text">点击右下角下载按钮查看并下载素材</span>
            </li>
        </ul>

        <div class="github-wrap">
            <a href="https://github.com/klierbyck/doubao-cleaner" target="_blank" class="link-button">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                </svg>
                开源项目
            </a>
        </div>
    </div>

    <div class="footer">
        <span class="footer-text">© 2026 小白素材解析工具</span>
    </div>
</body>
</html>
